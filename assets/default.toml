[general]
debug = false

[paths]
instances_dir = "~/.local/share/mcl/instances"
meta_dir = "~/.local/share/mcl/meta"
# java_path is optional, leave commented out by default

[defaults]
memory_min = "512M"
memory_max = "2G"

[colors]
background = "#1e1e1e"
foreground = "white"
border_focused = "white"
border_unfocused = "darkgray"
row_highlight = "yellow"
row_background = "#1a1a1a"
row_alternate_bg = "#242424"
popup_bg = "#1e1e1e"
error = "red"
warn = "yellow"
success = "green"
accent = "yellow"
text_idle = "darkgray"
progress_fill = "green"
progress_track = "darkgray"
badge_text = "black"
fade_to = "darkgray"
